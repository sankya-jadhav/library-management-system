{% extends 'library/base.html' %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">{{ action }} Book</h1>

<form method="post" class="bg-white p-4 rounded-md shadow max-w-2xl">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="space-y-4">
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-sm text-red-600">{{ field.errors }}</p>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    <div class="mt-4">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md">{{ action }}</button>
        <a href="{% url 'staff_book_list' %}" class="ml-2 px-4 py-2 bg-gray-100 text-gray-800 rounded-md">Cancel</a>
    </div>
</form>

{% endblock %}
